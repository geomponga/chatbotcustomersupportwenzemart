<!DOCTYPE html>

<html>
<head>
 <!--
      Capstone Project
      FAQ Customer Support Chatbot for Wenzemart Store® (Not a real store yet) 
      
      Author: Georges Mponga 
      Date:  05/03/2026

      Filename: index.htm
   -->
    <title>FAQ Chatbot</title>
    <style>
	/* Full‑page glowing background */
.glow-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center,
        rgba(0, 200, 255, 0.25),
        rgba(0, 0, 0, 0.9)
    );
    animation: glowPulse 6s ease-in-out infinite alternate;
    z-index: -4; /* behind grid + neon panels */
}

/* Smooth pulsing glow */
@keyframes glowPulse {
    0% {
        opacity: 0.4;
        filter: blur(20px);
    }
    100% {
        opacity: 0.8;
        filter: blur(35px);
    }

}

	.chat-footer {
    text-align: center;
    color: white;
    padding: 15px 0;
    font-size: 14px;
    opacity: 0.8;
}

	/* Default desktop layout */
#chatbox {
    width: 50%;
}

#input {
    width: 43%;
}

/* ============================= */
/* 📱 Mobile & Small Screens     */
/* ============================= */
@media (max-width: 768px) {
    #chatbox {
        width: 90%;
        height: 350px;
        border-width: 12px;
    }

    #input {
        width: 85%;
        border-width: 3px;
    }

    #send {
        width: 90%;
        font-size: 16px;
    }

    h2 {
        font-size: 20px;
    }
}



        body { font-family: Arial; padding: 20px; }

        /* Chatbox container */
        #chatbox {
            width: 50%;
            height: 300px;
            border: 20px solid #6e6e6e; /* base grey */
            padding: 10px;
            overflow-y: auto;
            margin: 0 auto;
            background: white;
			border-radius: 10px
			/* glowing grey effect */
			box-shadow: 0 0 10px #9e9e9e, 
						0 0 40px #7a7a7a inset;
        }

        /* Input box */
        #input {
            width: 43%;
            padding: 10px;
            border: 5px solid #6e6e6e; /* base grey */
            margin: 0 auto;
            display: block;
        }

        /* Default send button */
		#send {
			padding: 10px;
			background-color: grey;
			color: white;
			border: none;
			border-radius: 6px;
			display: block;
			margin: 10px auto;
			cursor: pointer;
			transition: 0.3s ease;
}

		/* Turns blue when typing */
		#send.active-send {
			background-color: #007bff;
			box-shadow: 0 0 12px #007bff;
}

}
        }

        /* User message bubble */
        .user-msg {
            background-color: #e5e5e5;
            color: #333;
            padding: 10px;
            border-radius: 8px;
            margin: 8px 0;
            width: fit-content;
            max-width: 70%;
        }

        /* Chatbot message bubble */
        .bot-msg {
            background-color: #d0e7ff;
            color: #0056b3;
            padding: 10px;
            border-radius: 8px;
            margin: 8px 0;
            width: fit-content;
            max-width: 70%;
        }
    </style>
</head>
<body>


<h2 style="text-align: center;">
  FAQ Customer Support Chatbot<br>
  Wenzemart Store&#174;

</h2>
<div class="glow-bg"></div>
<div id="chatbox"></div>
<div class="side-glow side-left"></div>
<div class="side-glow side-right"></div>


<input id="input" type="text" placeholder="Type your question here...">
<button id="send">Send</button>

<!-- ENTER KEY SENDS MESSAGE -->
<script>
document.getElementById("input").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("send").click();
    }
});
</script>

<!-- SEND BUTTON LOGIC -->
<script>
document.getElementById("send").onclick = function () {
    const message = document.getElementById("input").value.trim();
    if (message === "") return;

    const chatbox = document.getElementById("chatbox");

    // Customer message
    chatbox.innerHTML += `
        <div class="user-msg">
            <strong>Customer:</strong> ${message}
        </div>
    `;

    fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        // Lisa message
        chatbox.innerHTML += `
            <div class="bot-msg">
                <strong>Lisa:</strong> ${data.response}
            </div>
        `;
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    document.getElementById("input").value = "";
};

</script>

<script>
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

input.addEventListener("input", () => {
    if (input.value.trim() !== "") {
        sendBtn.classList.add("active-send");
    } else {
        sendBtn.classList.remove("active-send");
    }
});
</script>


<!-- FOOTER -->
<footer class="chat-footer">
    <p>© 2026 Wenzemart Store® — Customer Support Chatbot</p>
</footer>

</body>
</html>
